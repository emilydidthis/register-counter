<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Count - The Whispering Shelf</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Oxygen:wght@300;400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Oxygen', sans-serif;
      background-color: #FFF8F0;
      color: #3A3632;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 500px;
      height: 100vh;
      max-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 1.5vh 0;
    }

    .header {
      text-align: center;
      flex: 0 0 auto;
      padding-bottom: 1.5vh;
    }

    .header h1 {
      font-family: 'Lora', serif;
      font-size: 4vh;
      font-weight: 600;
      color: #34524F;
      margin-bottom: 0.2vh;
    }

    .header .subtitle {
      font-size: 1.6vh;
      color: #3A3632;
      opacity: 0.7;
      letter-spacing: 0.5px;
    }

    .target-display {
      flex: 0 0 auto;
      background-color: transparent;
      border: 2px solid #34524F;
      color: #3A3632;
      border-radius: 1.5vh;
      padding: 1.2vh 16px;
      text-align: center;
      margin-bottom: 1.5vh;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .target-display .label {
      font-size: 1.8vh;
      font-weight: 400;
      letter-spacing: 0.5px;
      color: #34524F;
    }

    .target-display .amount {
      font-family: 'Lora', serif;
      font-size: 3.2vh;
      font-weight: 600;
      color: #34524F;
    }

    .register-form {
      flex: 1 1 auto;
      background-color: #FFFFFF;
      border-radius: 1.5vh;
      padding: 1.5vh 25px;
      box-shadow: 0 2px 12px rgba(58, 54, 50, 0.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      margin-bottom: 1.5vh;
    }

    .section-label {
      font-size: 1.4vh;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #3A3632;
      opacity: 0.5;
      flex: 0 0 auto;
      text-align: center;
    }

    .section-label.bills-label {
      margin-bottom: 0.5vh;
    }

    .section-label.coins-label {
      margin-top: 0.5vh;
      margin-bottom: 0.5vh;
    }

    .denomination-rows {
      display: flex;
      flex-direction: column;
      flex: 1 1 auto;
      min-height: 0;
    }

    .denomination-rows.bills-rows {
      flex: 3 1 0;
    }

    .denomination-rows.coins-rows {
      flex: 2 1 0;
    }

    .denomination-row {
      display: grid;
      grid-template-columns: 80px 90px 80px;
      gap: 16px;
      justify-content: center;
      align-items: center;
      flex: 1 1 0;
      min-height: 0;
    }

    .denom-label {
      font-weight: 600;
      font-size: 2.4vh;
      font-family: 'Lora', serif;
      color: #34524F;
    }

    .quantity-input {
      width: 100%;
      padding: 0.5vh 8px;
      border: none;
      background-color: #F5F1EB;
      border-radius: 1vh;
      font-family: 'Oxygen', sans-serif;
      font-size: 2.2vh;
      text-align: center;
      transition: background-color 0.2s;
      color: #3A3632;
      -moz-appearance: textfield;
    }

    .quantity-input::-webkit-outer-spin-button,
    .quantity-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .quantity-input:focus {
      outline: none;
      background-color: #EDE8E0;
    }

    .quantity-input::placeholder {
      color: #C8C0B6;
    }

    .row-total {
      text-align: right;
      font-weight: 600;
      color: #3A3632;
      font-size: 2vh;
    }

    .total-display {
      flex: 0 0 auto;
      background-color: #34524F;
      border-radius: 1.5vh;
      padding: 2vh;
      text-align: center;
      position: relative;
      overflow: hidden;
      margin-bottom: 1.5vh;
    }

    .total-display .label {
      color: #D4CFC9;
      font-size: 1.8vh;
      font-weight: 400;
      letter-spacing: 0.5px;
      margin-bottom: 0.3vh;
    }

    .total-display .amount {
      font-family: 'Lora', serif;
      font-size: 6vh;
      font-weight: 600;
      color: #FFFFFF;
      transition: color 0.3s;
    }

    .total-display.perfect .amount {
      color: #D4B57A;
    }

    .total-display .difference {
      font-size: 1.6vh;
      margin-top: 0.3vh;
      color: #D4CFC9;
    }

    .reset-btn {
      flex: 0 0 auto;
      padding: 1.5vh;
      background-color: transparent;
      border: 2px solid #D4CFC9;
      border-radius: 1.5vh;
      font-family: 'Oxygen', sans-serif;
      font-size: 1.8vh;
      color: #3A3632;
      cursor: pointer;
      transition: all 0.2s;
    }

    .reset-btn:hover {
      background-color: #D4CFC9;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Register Count</h1>
      <p class="subtitle">The Whispering Shelf</p>
    </div>

    <div class="target-display">
      <span class="label">TARGET</span>
      <span class="amount">$250.00</span>
    </div>

    <div class="register-form">
      <div class="section-label bills-label">Bills</div>
      <div class="denomination-rows bills-rows">
        <div class="denomination-row">
          <span class="denom-label">$100</span>
          <input type="number" class="quantity-input" data-value="100" placeholder="0" min="0">
          <span class="row-total">$0.00</span>
        </div>
        <div class="denomination-row">
          <span class="denom-label">$50</span>
          <input type="number" class="quantity-input" data-value="50" placeholder="0" min="0">
          <span class="row-total">$0.00</span>
        </div>
        <div class="denomination-row">
          <span class="denom-label">$20</span>
          <input type="number" class="quantity-input" data-value="20" placeholder="0" min="0">
          <span class="row-total">$0.00</span>
        </div>
        <div class="denomination-row">
          <span class="denom-label">$10</span>
          <input type="number" class="quantity-input" data-value="10" placeholder="0" min="0">
          <span class="row-total">$0.00</span>
        </div>
        <div class="denomination-row">
          <span class="denom-label">$5</span>
          <input type="number" class="quantity-input" data-value="5" placeholder="0" min="0">
          <span class="row-total">$0.00</span>
        </div>
        <div class="denomination-row">
          <span class="denom-label">$1</span>
          <input type="number" class="quantity-input" data-value="1" placeholder="0" min="0">
          <span class="row-total">$0.00</span>
        </div>
      </div>

      <div class="section-label coins-label">Coins</div>
      <div class="denomination-rows coins-rows">
        <div class="denomination-row">
          <span class="denom-label">$0.25</span>
          <input type="number" class="quantity-input" data-value="0.25" placeholder="0" min="0">
          <span class="row-total">$0.00</span>
        </div>
        <div class="denomination-row">
          <span class="denom-label">$0.10</span>
          <input type="number" class="quantity-input" data-value="0.10" placeholder="0" min="0">
          <span class="row-total">$0.00</span>
        </div>
        <div class="denomination-row">
          <span class="denom-label">$0.05</span>
          <input type="number" class="quantity-input" data-value="0.05" placeholder="0" min="0">
          <span class="row-total">$0.00</span>
        </div>
        <div class="denomination-row">
          <span class="denom-label">$0.01</span>
          <input type="number" class="quantity-input" data-value="0.01" placeholder="0" min="0">
          <span class="row-total">$0.00</span>
        </div>
      </div>
    </div>

    <div class="total-display" id="totalDisplay">
      <div class="label">TOTAL</div>
      <div class="amount" id="totalAmount">$0.00</div>
      <div class="difference" id="difference"></div>
    </div>

    <button class="reset-btn" id="resetBtn">Reset All</button>
  </div>

  <script>
    const TARGET = 250;
    const inputs = document.querySelectorAll('.quantity-input');
    const totalAmount = document.getElementById('totalAmount');
    const totalDisplay = document.getElementById('totalDisplay');
    const difference = document.getElementById('difference');
    const resetBtn = document.getElementById('resetBtn');

    let confettiFired = false;

    function calculate() {
      let total = 0;

      inputs.forEach(input => {
        const value = parseFloat(input.dataset.value);
        const quantity = parseInt(input.value) || 0;
        const rowTotal = value * quantity;
        total += rowTotal;

        const rowTotalEl = input.nextElementSibling;
        rowTotalEl.textContent = formatMoney(rowTotal);
      });

      totalAmount.textContent = formatMoney(total);

      const diff = TARGET - total;
      if (Math.abs(diff) < 0.005) {
        difference.textContent = 'Perfect!';
        totalDisplay.classList.add('perfect');
        if (!confettiFired) {
          confettiFired = true;
          fireConfetti();
        }
      } else {
        const sign = diff > 0 ? '$' : '-$';
        difference.textContent = `${sign}${Math.abs(diff).toFixed(2)} to go`;
        totalDisplay.classList.remove('perfect');
        confettiFired = false;
      }
    }

    function formatMoney(amount) {
      return '$' + amount.toFixed(2);
    }

    function fireConfetti() {
      const duration = 3000;
      const end = Date.now() + duration;

      const frame = () => {
        confetti({
          particleCount: 3,
          angle: 60,
          spread: 65,
          startVelocity: 30,
          origin: { x: 0, y: 0.7 },
          colors: ['#D4B57A', '#34524F', '#D4CFC9', '#FFFFFF']
        });
        confetti({
          particleCount: 3,
          angle: 120,
          spread: 65,
          startVelocity: 30,
          origin: { x: 1, y: 0.7 },
          colors: ['#D4B57A', '#34524F', '#D4CFC9', '#FFFFFF']
        });

        if (Date.now() < end) {
          requestAnimationFrame(frame);
        }
      };

      frame();
    }

    inputs.forEach(input => {
      input.addEventListener('input', calculate);
    });

    resetBtn.addEventListener('click', () => {
      inputs.forEach(input => {
        input.value = '';
        input.nextElementSibling.textContent = '$0.00';
      });
      totalAmount.textContent = '$0.00';
      difference.textContent = '';
      totalDisplay.classList.remove('perfect');
      confettiFired = false;
    });
  </script>
</body>
</html>
